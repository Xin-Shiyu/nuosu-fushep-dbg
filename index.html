<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凉山规范彝文检字编辑器 - FUSHEP</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script async defer src="https://buttons.github.io/buttons.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="app-logo">
                <div class="yi-logo">ꃚꎹ</div>
                <div class="latin-logo">&nbsp;|&nbsp;FUSHEP</div>
            </div>
            <div class="app-subtitle">
                    <span data-i18n="subtitle">凉山规范彝文检字编辑器</span> <span>v0.1.9</span>
                </div>
            <div class="header-controls">
                <select class="select color-brand-input" id="lang-selector" onchange="setLanguage(this.value)">
                    <option value="zh-CN" lang="zh-CN">简体中文</option>】
                    <option value="zh-TW" lang="zh-TW">繁體中文</option>
                    <option value="en" lang="en">English</option>
                    <option value="ja" lang="ja">日本語</option>
                    <option value="ko" lang="ko">한국어</option>
                    <option value="ii" lang="ii">ꆈꌠ꒿（ꎕꏦ）</option>
                    <option value="za" lang="za">Vahcuengh</option>
                    <option value="la" lang="la">Lingua Latina</option>
                </select>
            </div>
        </header>
        <main></main>
    </div>

    <script src="data_chars.js"></script>
    <script src="phonetics.js"></script>
    <script src="lang.js"></script>
    <script src="init.js"></script>
    <script src="radicals.js"></script>
    <script src="model/compress.js"></script>
    <script src="model/model.js"></script>
    <script src="strokes.js"></script>
    <script src="pinyin.js"></script>
</body>
</html>
